<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>NEXUS ROYALE v2.0</title>
<style>
  html,body { margin:0; height:100%; background:#060410; overflow:hidden;
    font-family:'Segoe UI',system-ui,sans-serif; color:#e8e6ff;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; overscroll-behavior:none; }
  #game { position:fixed; inset:0; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="game"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<script src="js/Assets.js"></script>
<script src="js/Constants.js"></script>
<script src="js/BootScene.js"></script>
<script src="js/MenuScene.js"></script>
<script src="js/GameScene.js"></script>
<script>
const config = {
  type: Phaser.AUTO,
  parent: 'game',
  backgroundColor: '#060410',
  scale: { mode: Phaser.Scale.RESIZE, width: '100%', height: '100%' },
  physics: { default: 'arcade', arcade: { gravity: { y:0 }, debug: false } },
  scene: [BootScene, MenuScene, GameScene],
  render: { pixelArt: true, antialias: false }
};
new Phaser.Game(config);
</script>
</body>
</html>
